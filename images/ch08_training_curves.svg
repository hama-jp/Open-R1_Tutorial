<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13">
  <style>
    .axis { stroke: #2b3a55; stroke-width: 1.2; }
    .gridline { stroke: #e6e6e6; stroke-width: 0.6; }
    .reward { stroke: #1c5fa8; stroke-width: 2.4; fill: none; }
    .length-correct { stroke: #2f7a32; stroke-width: 2.4; fill: none; }
    .length-wrong { stroke: #c2541b; stroke-width: 2.0; fill: none; stroke-dasharray: 5,3; }
    .label { fill: #2b3a55; }
    .small { font-size: 11px; fill: #4a5575; }
    .title { font-size: 16px; font-weight: bold; fill: #1a1a1a; }
    .anno { fill: #c2181c; font-weight: bold; }
    .axis-label { font-size: 12px; fill: #2b3a55; }
    .legend-box { stroke-width: 0; }
  </style>

  <text x="380" y="26" text-anchor="middle" class="title">"あはもーめんと" を読み取る学習曲線（条件付きの伸びを見る）</text>

  <!-- Plot area -->
  <g transform="translate(80,70)">
    <!-- Frame -->
    <rect x="0" y="0" width="600" height="280" fill="#fcfcfd" stroke="#aab0c0" stroke-width="1"/>

    <!-- Gridlines -->
    <line class="gridline" x1="120" y1="0" x2="120" y2="280"/>
    <line class="gridline" x1="240" y1="0" x2="240" y2="280"/>
    <line class="gridline" x1="360" y1="0" x2="360" y2="280"/>
    <line class="gridline" x1="480" y1="0" x2="480" y2="280"/>
    <line class="gridline" x1="0" y1="56" x2="600" y2="56"/>
    <line class="gridline" x1="0" y1="112" x2="600" y2="112"/>
    <line class="gridline" x1="0" y1="168" x2="600" y2="168"/>
    <line class="gridline" x1="0" y1="224" x2="600" y2="224"/>

    <!-- Axes -->
    <line class="axis" x1="0" y1="280" x2="600" y2="280"/>
    <line class="axis" x1="0" y1="0"   x2="0"   y2="280"/>
    <line class="axis" x1="600" y1="0" x2="600" y2="280"/>

    <!-- X axis ticks -->
    <text x="0"   y="298" text-anchor="middle" class="small">0</text>
    <text x="120" y="298" text-anchor="middle" class="small">100</text>
    <text x="240" y="298" text-anchor="middle" class="small">200</text>
    <text x="360" y="298" text-anchor="middle" class="small">300</text>
    <text x="480" y="298" text-anchor="middle" class="small">400</text>
    <text x="600" y="298" text-anchor="middle" class="small">500 step</text>

    <!-- Y left axis label -->
    <text x="-10" y="0"   text-anchor="end" class="small">1.0</text>
    <text x="-10" y="56"  text-anchor="end" class="small">0.8</text>
    <text x="-10" y="112" text-anchor="end" class="small">0.6</text>
    <text x="-10" y="168" text-anchor="end" class="small">0.4</text>
    <text x="-10" y="224" text-anchor="end" class="small">0.2</text>
    <text x="-10" y="280" text-anchor="end" class="small">0.0</text>
    <text x="-50" y="-10" class="axis-label" fill="#1c5fa8">reward/mean</text>

    <!-- Y right axis label -->
    <text x="610" y="0"   class="small">800</text>
    <text x="610" y="56"  class="small">650</text>
    <text x="610" y="112" class="small">500</text>
    <text x="610" y="168" class="small">350</text>
    <text x="610" y="224" class="small">200</text>
    <text x="610" y="280" class="small">  50</text>
    <text x="660" y="-10" class="axis-label" fill="#2f7a32">completion_length (token)</text>

    <!-- Reward curve (rises sigmoid-ish from ~0.1 to ~0.65) -->
    <!-- y=280 is reward 0.0; reward 0.1 -> y=252; reward 0.65 -> y=98 -->
    <path class="reward" d="
      M 0 252
      L 30 250
      L 60 246
      L 90 240
      L 120 234
      L 150 220
      L 180 198
      L 210 168
      L 240 138
      L 270 118
      L 300 108
      L 330 102
      L 360 98
      L 400 95
      L 440 93
      L 480 92
      L 520 91
      L 560 91
      L 600 91
    "/>

    <!-- Length on correct samples (rises strongly) -->
    <!-- y=280 is 50, y=0 is 800; len 150 -> y=224, len 700 -> y=20 -->
    <path class="length-correct" d="
      M 0 240
      L 30 235
      L 60 228
      L 90 218
      L 120 200
      L 150 175
      L 180 145
      L 210 110
      L 240 85
      L 270 65
      L 300 55
      L 330 48
      L 360 42
      L 400 36
      L 440 32
      L 480 28
      L 520 26
      L 560 24
      L 600 22
    "/>

    <!-- Length on wrong samples (rises only modestly then plateaus) -->
    <path class="length-wrong" d="
      M 0 230
      L 30 226
      L 60 222
      L 90 216
      L 120 210
      L 150 204
      L 180 198
      L 210 192
      L 240 186
      L 270 180
      L 300 175
      L 330 172
      L 360 170
      L 400 168
      L 440 167
      L 480 167
      L 520 168
      L 560 169
      L 600 170
    "/>

    <!-- Aha moment annotation -->
    <line x1="210" y1="0" x2="210" y2="280" stroke="#c2181c" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="210" y="-12" text-anchor="middle" class="anno">"aha moment" 出現</text>
    <text x="210" y="-30" text-anchor="middle" class="small">（CoT が伸びると同時に reward も伸び始める）</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80,380)">
    <line x1="0" y1="0" x2="30" y2="0" class="reward"/>
    <text x="36" y="4" class="label">reward/mean（正答率）</text>

    <line x1="220" y1="0" x2="250" y2="0" class="length-correct"/>
    <text x="256" y="4" class="label">completion_length（正答サンプル）</text>

    <line x1="0" y1="22" x2="30" y2="22" class="length-wrong"/>
    <text x="36" y="26" class="label">completion_length（不正答サンプル）</text>
  </g>

  <text x="380" y="445" text-anchor="middle" class="small">図8-1: 「長さ」と「正答率」が同期して伸び、かつ正答サンプルだけが顕著に長くなる — これが探索改善の兆候。長さ単独では何の証拠にもならない。</text>
</svg>
