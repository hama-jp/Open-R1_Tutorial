<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13">
  <style>
    .axis { stroke: #888; stroke-width: 1; }
    .gridline { stroke: #ddd; stroke-width: 0.5; }
    .vec0 { stroke: #2f7a32; stroke-width: 2.4; fill: none; marker-end: url(#tip-g); }
    .vecm { stroke: #1c5fa8; stroke-width: 2.4; fill: none; marker-end: url(#tip-b); }
    .vecn { stroke: #c2541b; stroke-width: 2.4; fill: none; marker-end: url(#tip-o); }
    .arc-g { stroke: #2f7a32; stroke-width: 1; fill: none; stroke-dasharray: 3,2; }
    .arc-b { stroke: #1c5fa8; stroke-width: 1; fill: none; stroke-dasharray: 3,2; }
    .arc-o { stroke: #c2541b; stroke-width: 1; fill: none; stroke-dasharray: 3,2; }
    .label { fill: #2b3a55; }
    .small { font-size: 11px; fill: #4a5575; }
    .formula { font-style: italic; fill: #1a1a1a; }
    .title { font-size: 16px; font-weight: bold; fill: #1a1a1a; }
    .box { fill: #f4f6fa; stroke: #2b3a55; stroke-width: 1.2; }
  </style>
  <defs>
    <marker id="tip-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f7a32"/>
    </marker>
    <marker id="tip-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c5fa8"/>
    </marker>
    <marker id="tip-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2541b"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" class="title">RoPE: 位置 m に応じてベクトルを 2 次元ペアごとに回転</text>

  <!-- Coordinate plane (left side) -->
  <g transform="translate(60,60)">
    <rect class="box" x="0" y="0" width="320" height="320" rx="4"/>
    <!-- gridlines -->
    <line class="gridline" x1="160" y1="20"  x2="160" y2="300"/>
    <line class="gridline" x1="40"  y1="160" x2="280" y2="160"/>
    <line class="axis" x1="40" y1="160" x2="280" y2="160"/>
    <line class="axis" x1="160" y1="20" x2="160" y2="300"/>
    <text x="284" y="155" class="small">x</text>
    <text x="155" y="18" class="small">y</text>

    <!-- vector at position 0 (no rotation) -->
    <line class="vec0" x1="160" y1="160" x2="260" y2="100"/>
    <text x="265" y="98" class="label" fill="#2f7a32">q (位置 0)</text>

    <!-- vector at position m (rotated 50°) -->
    <line class="vecm" x1="160" y1="160" x2="225" y2="55"/>
    <text x="135" y="50" class="label" fill="#1c5fa8">q' = R(mθ) q</text>
    <text x="172" y="68" class="small" fill="#1c5fa8">位置 m</text>

    <!-- vector at position n (rotated 110°) -->
    <line class="vecn" x1="160" y1="160" x2="105" y2="60"/>
    <text x="20" y="58" class="label" fill="#c2541b">q'' = R(nθ) q</text>
    <text x="50" y="74" class="small" fill="#c2541b">位置 n</text>

    <!-- arc showing rotation angle -->
    <path class="arc-b" d="M 220 130 A 70 70 0 0 0 230 95"/>
    <text x="244" y="120" class="small" fill="#1c5fa8">mθ</text>
    <path class="arc-o" d="M 220 130 A 75 75 0 0 0 90 130"/>
    <text x="155" y="100" class="small" fill="#c2541b">nθ</text>
  </g>

  <!-- Right side: math + intuition -->
  <g transform="translate(420,60)">
    <text x="0" y="20" class="label" font-weight="bold">2 次元ペアの回転式</text>
    <text x="0" y="48" class="formula">R(mθ) = | cos(mθ)  −sin(mθ) |</text>
    <text x="0" y="66" class="formula">           |  sin(mθ)   cos(mθ) |</text>

    <text x="0" y="100" class="label" font-weight="bold">大事な性質</text>
    <text x="0" y="124" class="small">⟨ R(mθ) q ,  R(nθ) k ⟩</text>
    <text x="0" y="144" class="small">  =  ⟨ q ,  R((n−m)θ) k ⟩</text>

    <text x="0" y="174" class="label">→ Q·K の内積は</text>
    <text x="0" y="192" class="label">　<tspan font-weight="bold">相対位置 (n − m)</tspan> だけで決まる</text>

    <text x="0" y="226" class="label" font-weight="bold">複数周波数</text>
    <text x="0" y="248" class="small">d 次元ベクトルの隣接ペアごとに</text>
    <text x="0" y="264" class="small">θ_i = 1 / base^(2i/d) と異なる速度で回す</text>
    <text x="0" y="284" class="small">→ 短距離も長距離も同時に表現可能</text>

    <text x="0" y="316" class="label" font-weight="bold">長文対応</text>
    <text x="0" y="338" class="small">base を大きくすると低周波が増え、</text>
    <text x="0" y="354" class="small">長距離依存を捉えやすくなる</text>
  </g>

  <text x="380" y="420" text-anchor="middle" class="small">図4-1: RoPE は埋め込みを 2 次元ずつ回転させ、内積に「相対位置」を埋め込む。長文対応の base 拡張は周波数 θ を全体的にゆっくりにする操作。</text>
</svg>
